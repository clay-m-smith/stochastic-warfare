  - side: german
    units:
      - unit_type: tiger_i
        count: 15
      - unit_type: panther
        count: 20
      - unit_type: panzer_iv_h
        count: 30
    experience_level: 0.7
    morale_initial: STEADY
    commander_profile: aggressive_patton
    doctrine_template: blitzkrieg

objectives:
  - objective_id: prokhorovka_village
    position: [6000, 4000]
    radius_m: 1000
    type: territory

victory_conditions:
