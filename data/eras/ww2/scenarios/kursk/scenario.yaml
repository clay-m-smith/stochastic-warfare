name: "Prokhorovka Tank Battle (Kursk, 1943)"
date: "1943-07-12T06:00:00Z"
duration_hours: 8.0
latitude: 51.0
longitude: 36.4
era: ww2

tick_resolution:
  strategic_s: 3600
  operational_s: 300
  tactical_s: 5

weather_conditions:
  visibility_m: 5000
  wind_speed_mps: 3.0
  wind_direction_deg: 180
  temperature_c: 28.0
  precipitation: none
  cloud_cover: 0.3
  humidity: 0.55

terrain:
  width_m: 12000
  height_m: 8000
  cell_size_m: 100.0
  base_elevation_m: 200.0
