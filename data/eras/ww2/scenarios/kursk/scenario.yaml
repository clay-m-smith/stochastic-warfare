    side: ""
    params:
      threshold: 0.6
  - type: time_expired
    side: soviet
    params:
      max_duration_s: 28800

calibration_overrides:
  hit_probability_modifier: 1.0
  target_size_modifier: 0.7
  morale_degrade_rate_modifier: 0.25
  morale_base_degrade_rate: 0.008
  morale_casualty_weight: 0.4
  morale_check_interval: 20
  soviet_force_ratio_modifier: 1.0
