  soviet_cohesion: 0.6
  german_cohesion: 0.8
  destruction_threshold: 0.5
  soviet_start_x: 500.0
  soviet_start_y: 4000.0
  german_start_x: 11500.0
  german_start_y: 4000.0
  weapon_assignments:
    "85mm ZIS-S-53": 85mm_zis_s53
    "88mm KwK 36 L/56": 88mm_kwk36
    "75mm KwK 42 L/70": 88mm_kwk36
    "75mm KwK 40 L/48": 75mm_m3

documented_outcomes:
  - name: soviet_units_destroyed
    value: 300.0
    tolerance_factor: 3.0
    unit: tanks
    source: "Glantz & House, *The Battle of Kursk*"
    source_quality: 1
    notes: "Estimated Soviet tank losses at Prokhorovka"
  - name: german_units_destroyed
    value: 80.0
    tolerance_factor: 3.0
    unit: tanks
    source: "Zetterling & Frankson, *Kursk 1943: A Statistical Analysis*"
    source_quality: 1
    notes: "German losses were significantly lower"

sources:
  - "Glantz, David M. & House, Jonathan M. *The Battle of Kursk*"
  - "Zetterling, Niklas & Frankson, Anders. *Kursk 1943: A Statistical Analysis*"
  - "Showalter, Dennis. *Armor and Blood: The Battle of Kursk*"
