name: "Battle of Midway (1942)"
date: "1942-06-04T06:00:00Z"
duration_hours: 24.0
latitude: 28.2
longitude: -177.4
era: ww2

tick_resolution:
  strategic_s: 3600
  operational_s: 300
  tactical_s: 5

weather_conditions:
  visibility_m: 15000
  wind_speed_mps: 5.0
  wind_direction_deg: 90
  temperature_c: 22.0
  precipitation: none
  cloud_cover: 0.4
  humidity: 0.70

terrain:
  # Reduced from 100km×80km to bring forces within carrier strike range faster
  width_m: 50000
  height_m: 40000
  cell_size_m: 1000.0
  base_elevation_m: 0.0
  terrain_type: open_ocean

sides:
  - side: usn
    units:
      - unit_type: essex_cv
        count: 3
      - unit_type: fletcher_dd
        count: 4
    experience_level: 0.6
    morale_initial: STEADY

  - side: ijn
    units:
      - unit_type: shokaku_cv
        count: 4
      - unit_type: fletcher_dd
        count: 4
      - unit_type: a6m_zero
        count: 6
    experience_level: 0.7
    morale_initial: STEADY

objectives:
  - objective_id: midway_atoll
    position: [25000, 20000]
    radius_m: 5000
    type: territory

victory_conditions:
  # USN wins by destroying/disabling IJN carriers — historically all 4 sunk
  - type: force_destroyed
    side: usn
    params:
      # 4 carriers disabled/destroyed out of 14 IJN units = 28.6%; threshold 0.25 captures this
      threshold: 0.25
      target_side: ijn
      count_disabled: true
  - type: time_expired
    side: usn
    params:
      max_duration_s: 86400

calibration_overrides:
  hit_probability_modifier: 0.8
  target_size_modifier: 1.0
  # Dupuy CEV: USN had ULTRA intelligence + caught IJN carriers with armed aircraft on deck
  # (Parshall & Tully, *Shattered Sword*). CEV 3.0:0.5 reflects decisive surprise advantage.
  usn_force_ratio_modifier: 2.5
  ijn_force_ratio_modifier: 0.7
  # IJN carriers with fueled/armed aircraft = catastrophically vulnerable (magazine detonations)
  target_size_modifier_ijn: 1.8
  target_size_modifier_usn: 0.5
  morale_degrade_rate_modifier: 1.5
  morale_base_degrade_rate: 0.005
  morale_casualty_weight: 0.8
  morale_check_interval: 30
  usn_cohesion: 0.8
  ijn_cohesion: 0.7
  destruction_threshold: 0.50
  # 30km separation — within carrier strike range (~16km weapon range)
  usn_start_x: 5000.0
  usn_start_y: 20000.0
  ijn_start_x: 45000.0
  ijn_start_y: 20000.0
  weapon_assignments:
    "5-inch/38 Mk 12 Gun (4x2 turrets)": 5in38_naval
    "5-inch/38 Mk 12 Gun (x5)": 5in38_naval
    "Mk 15 Torpedo Tubes (2x5)": mk14_torpedo
    "Depth Charge Racks and K-Guns": depth_charge_mk7
    "Type 99 Model 2 20mm Cannon (x2)": type99_20mm

documented_outcomes:
  - name: ijn_units_destroyed
    value: 4.0
    tolerance_factor: 3.0
    unit: carriers
    source: "Parshall & Tully, *Shattered Sword*"
    source_quality: 1
    notes: "All 4 IJN fleet carriers sunk"
  - name: usn_units_destroyed
    value: 1.0
    tolerance_factor: 3.0
    unit: carriers
    source: "Parshall & Tully, *Shattered Sword*"
    source_quality: 1
    notes: "USS Yorktown sunk"

sources:
  - "Parshall, Jonathan & Tully, Anthony. *Shattered Sword: The Untold Story of the Battle of Midway*"
  - "Symonds, Craig L. *The Battle of Midway*"
