name: "Battle of Hastings (October 14, 1066)"
date: "1066-10-14T09:00:00Z"
duration_hours: 9.0
latitude: 50.91
longitude: 0.49
era: ancient_medieval

tick_resolution:
  strategic_s: 3600
  operational_s: 300
  tactical_s: 5

weather_conditions:
  visibility_m: 4000
  wind_speed_mps: 3.0
  wind_direction_deg: 220
  temperature_c: 12.0
  precipitation: none
  cloud_cover: 0.5
  humidity: 0.65

terrain:
  width_m: 2000
  height_m: 1000
  cell_size_m: 50.0
  base_elevation_m: 80.0
  terrain_type: hilly_defense

sides:
  - side: saxon
    units:
      - unit_type: viking_huscarl
        count: 3
        overrides:
          display_name: "Saxon Huscarl"
    experience_level: 0.60
    morale_initial: STEADY
    commander_profile: henry_v
    doctrine_template: english_defensive
    depots:
      - depot_id: saxon_depot
        position: [200, 500]
        capacity_tons: 300
        throughput_tons_per_hour: 25.0

  - side: norman
    units:
      - unit_type: norman_knight_conroi
        count: 2
      - unit_type: viking_huscarl
        count: 1
        overrides:
          display_name: "Norman Infantry"
      - unit_type: english_longbowman
        count: 1
        overrides:
          display_name: "Norman Archers"
    experience_level: 0.60
    morale_initial: STEADY
    commander_profile: william_conqueror
    doctrine_template: roman_legion
    depots:
      - depot_id: norman_depot
        position: [1800, 500]
        capacity_tons: 400
        throughput_tons_per_hour: 30.0

objectives:
  - objective_id: senlac_hill
    position: [500, 500]
    radius_m: 300
    type: key_terrain
  - objective_id: battle_field
    position: [1000, 500]
    radius_m: 400
    type: territory

victory_conditions:
  - type: force_destroyed
    side: ""
    params:
      threshold: 0.5
  - type: morale_collapsed
    side: ""
    params:
      threshold: 0.6
  - type: time_expired
    side: norman
    params:
      max_duration_s: 32400

calibration_overrides:
  hit_probability_modifier: 0.7
  target_size_modifier: 0.7
  morale_degrade_rate_modifier: 0.5
  morale_base_degrade_rate: 0.010
  morale_casualty_weight: 0.5
  morale_check_interval: 20
  saxon_force_ratio_modifier: 1.2
  norman_force_ratio_modifier: 1.0
  saxon_cohesion: 0.70
  norman_cohesion: 0.65
  destruction_threshold: 0.5
  saxon_start_x: 300.0
  saxon_start_y: 500.0
  norman_start_x: 1700.0
  norman_start_y: 500.0
  advance_speed: 0.6
  weapon_assignments:
    "Sword (Medieval)": sword_medieval
    "Shield": sword_medieval
    "Lance (Medieval)": lance_medieval
    "Longbow": longbow

documented_outcomes:
  - name: saxon_casualty_fraction
    value: 0.50
    tolerance_factor: 3.0
    unit: fraction
    source: "Gravett, Christopher. *Hastings 1066*"
    source_quality: 2
    notes: "~50% Saxon casualties; shield wall eventually broken, Harold killed"
  - name: norman_casualty_fraction
    value: 0.30
    tolerance_factor: 3.0
    unit: fraction
    source: "Gravett, Christopher. *Hastings 1066*"
    source_quality: 2
    notes: "~30% Norman casualties; hard-fought combined arms victory"

sources:
  - "Gravett, Christopher. *Hastings 1066: The Fall of Saxon England*"
  - "Bradbury, Jim. *The Battle of Hastings*"
  - "Howarth, David. *1066: The Year of the Conquest*"
