  british_force_ratio_modifier: 3.0
  franco_spanish_force_ratio_modifier: 0.5
  morale_degrade_rate_modifier: 3.0
  morale_base_degrade_rate: 0.05
  morale_casualty_weight: 1.0
  morale_check_interval: 5
  british_cohesion: 0.95
  franco_spanish_cohesion: 0.15
  destruction_threshold: 0.35
  british_start_x: 5000.0
  british_start_y: 7500.0
  british_formation_spacing_m: 80.0
  franco_spanish_start_x: 10000.0
  franco_spanish_start_y: 7500.0
  franco_spanish_formation_spacing_m: 300.0
  weapon_assignments:
    "32-pdr Long Guns (lower deck, x28)": 32pdr_cannon
    "32-pdr Long Guns (lower deck, x32)": 32pdr_cannon
    "24-pdr Long Guns (middle deck, x34)": 24pdr_cannon
    "24-pdr Long Guns (x26)": 24pdr_cannon
    "18-pdr Long Guns (upper deck, x30)": 24pdr_cannon
    "18-pdr Long Guns (upper deck, x34)": 24pdr_cannon
    "9-pdr Guns (quarterdeck/forecastle, x16)": 6pdr_cannon
    "9-pdr Long Guns (x18)": 6pdr_cannon
