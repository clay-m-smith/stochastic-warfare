documented_outcomes:
  - name: franco_spanish_ships_captured_or_sunk
    value: 22.0
    tolerance_factor: 2.0
    unit: ships
    source: "Adkin, *The Trafalgar Companion*"
    source_quality: 0
    notes: "22 ships captured or sunk; decisive British victory"
  - name: british_ships_sunk
    value: 0.0
    tolerance_factor: 3.0
    unit: ships
    source: "Adkin, *The Trafalgar Companion*"
    source_quality: 0
    notes: "No British ships sunk during the battle"
  - name: british_casualties
    value: 1690.0
    tolerance_factor: 3.0
    unit: personnel
    source: "Gardiner, *The Campaign of Trafalgar*"
    source_quality: 1
    notes: "449 killed, 1241 wounded including Nelson"

ai_expectations:
  - side: british
    time_range_s: [0, 28800]
    expected_posture: attack
    description: "Nelson's two-column perpendicular attack on enemy line"
    tolerance: moderate
  - side: franco_spanish
    time_range_s: [0, 14400]
    expected_posture: defend
    description: "Combined fleet attempts to maintain line formation"
    tolerance: moderate

sources:
  - "Adkin, Mark. *The Trafalgar Companion*"
  - "Gardiner, Robert. *The Campaign of Trafalgar*"
  - "Lambert, Andrew. *Nelson: Britannia's God of War*"
  - "Rodger, N.A.M. *The Command of the Ocean*"
