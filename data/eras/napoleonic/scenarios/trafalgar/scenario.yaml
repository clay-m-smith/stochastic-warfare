    side: ""
    params:
      threshold: 0.08
      target_side: franco_spanish
      count_disabled: true
  - type: morale_collapsed
    side: franco_spanish
    params:
      threshold: 0.3
  - type: time_expired
    side: british
    params:
      max_duration_s: 28800

calibration_overrides:
