name: "Golan Heights - Valley of Tears (Day 2)"
date: "1973-10-07T06:00:00Z"
duration_hours: 18.0
tick_duration_seconds: 10.0
latitude: 33.1
longitude: 35.8

weather_conditions:
  visibility_m: 3000
  wind_speed_mps: 3.0
  wind_direction_deg: 180
  temperature_c: 22.0
  precipitation: none
  cloud_cover: 0.2
  humidity: 0.40

sides:
  - side: blue
    units:
      - unit_type: shot_kal
        count: 40
        overrides:
          training_level: 0.9
    experience_level: 0.7
    morale_initial: STEADY
  - side: red
    units:
      - unit_type: t55a
        count: 100
        overrides:
          training_level: 0.5
      - unit_type: t62
        count: 100
        overrides:
          training_level: 0.5
      - unit_type: bmp1
        count: 50
        overrides:
          training_level: 0.5
    experience_level: 0.4
    morale_initial: STEADY

blue_forces:
  side: blue
  units:
    - unit_type: shot_kal
      count: 40
  personnel_total: 160
  experience_level: 0.7
  morale_initial: STEADY

red_forces:
  side: red
  units:
    - unit_type: t55a
      count: 100
    - unit_type: t62
      count: 100
    - unit_type: bmp1
      count: 50
      overrides:
        armor_front: 33.0
  personnel_total: 2500
  experience_level: 0.4
  morale_initial: STEADY

terrain:
  width_m: 10000
  height_m: 5000
  cell_size_m: 100.0
  base_elevation_m: 900.0
  terrain_type: hilly_defense
  features:
    - type: ridge
      position: [3000, 0]
      params:
        height_m: 80.0
        width_m: 300.0
    - type: ridge
      position: [7000, 0]
      params:
        height_m: 60.0
        width_m: 250.0
    - type: berm
      position: [3000, 2500]
      params:
        height_m: 3.0
        radius_m: 100.0

documented_outcomes:
  - name: exchange_ratio
    value: 4.6
    tolerance_factor: 2.0
    unit: "red:blue destroyed"
    source: "Rabinovich, *The Yom Kippur War*"
    source_quality: 1
    notes: "Over 4 days; Day 2 ratio likely higher"
  - name: red_units_destroyed
    value: 100.0
    tolerance_factor: 2.0
    unit: "tanks"
    source: "7th Armored Brigade records"
    source_quality: 1
    notes: "Approximate Day 2 Syrian tank losses"
  - name: blue_units_destroyed
    value: 15.0
    tolerance_factor: 2.0
    unit: "tanks"
    source: "7th Armored Brigade records"
    source_quality: 1
    notes: "Approximate Day 2 Israeli tank losses"
  - name: duration_s
    value: 64800.0
    tolerance_factor: 1.5
    unit: "seconds"
    source: "IDF historical records"
    source_quality: 1
    notes: "18 hours of fighting"

victory_conditions:
  - type: force_destroyed
    side: ""
    params:
      threshold: 0.4
  - type: morale_collapsed
    side: ""
  - type: time_expired
    side: blue
    params:
      max_duration_s: 64800

calibration_overrides:
  # Phase 67: Block 7 flag enablement — dust/smoke, October weather
  enable_obscurants: true
  enable_seasonal_effects: true
  hit_probability_modifier: 1.0
  # Hull-down defensive positions reduce target size moderately.
  # 0.55 = ~4.7m² vs full 8.5m² — accounts for hull-down positions
  # with periodic exposure for fire/maneuver.
  target_size_modifier: 0.55
  thermal_contrast: 0.8
  # Morale calibration — Israeli forces held despite extreme 6:1 odds.
  # Syrian forces advanced aggressively but eventually broke.
  morale_degrade_rate_modifier: 0.2
  morale_force_ratio_weight: 0.05
  morale_base_degrade_rate: 0.005
  morale_base_recover_rate: 0.15
  morale_casualty_weight: 0.3
  morale_check_interval: 30
  blue_force_ratio_modifier: 4.0
  red_force_ratio_modifier: 1.0
  blue_cohesion: 0.95
  red_cohesion: 0.5
  # Standard destruction threshold — 50% damage = destroyed.
  destruction_threshold: 0.5
  # Starting positions — blue holds defensive ridge, red advances from east.
  # 9km separation for a long fighting withdrawal.
  blue_start_x: 1000.0
  blue_start_y: 2500.0
  red_start_x: 8000.0
  red_start_y: 2500.0
  defensive_sides:
    - blue
  visibility_m: 5000
  # Weapon assignments — correct weapon IDs for each platform
  weapon_assignments:
    "L7 105mm Rifled Gun": l7_105mm
    "D-10T 100mm Rifled Gun": d10t_100mm
    "U-5TS 115mm Smoothbore": u5ts_115mm
    "73mm 2A28 Grom": 2a28_grom_73mm
    "AT-3 Sagger ATGM": at3_sagger

behavior_rules:
  blue:
    hold_position: true
    engagement_range_m: 2500
  red:
    # 0.15 mps models stop-start wave attacks, not continuous advance.
    # ~8.5km / 0.15 mps ≈ 15.7h approach, close to 18h historical.
    advance_speed_mps: 0.15
    engagement_range_m: 2000

sources:
  - "Rabinovich, Abraham. *The Yom Kippur War*"
  - "Asher, Jerry. *Duel for the Golan*"
  - "Herzog, Chaim. *The War of Atonement*"
  - "7th Armored Brigade After-Action Reports"
