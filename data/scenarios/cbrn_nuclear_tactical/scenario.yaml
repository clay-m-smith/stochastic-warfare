name: "CBRN Nuclear Tactical Strike Validation"
description: >
  Tactical nuclear strike (10kT) on massed blue formation. Validates
  Hopkinson-Cranz blast radii, thermal fluence zones, EMP electronics
  effects, and wind-driven fallout plume per FM 3-11 tables.
start_date: "1985-06-15"
duration_s: 7200
seed: 42

terrain:
  type: procedural
  width_m: 5000
  height_m: 5000
  cell_size_m: 50
  base_elevation_m: 200

sides:
  blue:
    units:
      - unit_type: m1a2
        count: 4
        position: [2500.0, 2500.0]
        overrides:
          entity_id: blue_armor_1
          personnel_count: 16
      - unit_type: us_rifle_squad
        count: 6
        position: [2500.0, 2600.0]
        overrides:
          entity_id: blue_infantry_1
          personnel_count: 60
  red:
    units:
      - unit_type: m1a2
        count: 2
        position: [4500.0, 4500.0]
        overrides:
          entity_id: red_armor_1
          personnel_count: 8

cbrn:
  enable_cbrn: true
  nuclear_detonations:
    - weapon_id: tactical_10kt
      position: [2500.0, 2550.0]
      yield_kt: 10.0
      airburst: false
      time_s: 0

weather:
  wind_speed_m_s: 5.0
  wind_direction_rad: 0.785
  cloud_cover: 0.3

calibration_overrides:
  cbrn_update_interval_s: 10.0

documented_outcomes:
  description: >
    10kT ground burst at blue formation center. All blue units within 1km
    suffer blast and thermal casualties. EMP disables unshielded electronics
    within ~10km. Fallout plume extends downwind (NE).
  expected_blue_casualties_min_pct: 0.8
  expected_emp_radius_m: 10770
  expected_crater_radius_m: 25.8
  expected_fallout_mass_kg: 500.0
