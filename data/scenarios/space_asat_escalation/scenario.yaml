# Space validation scenario: ASAT escalation
# Tests: 6 ASAT strikes degrade GPS 24→~18, cascading DOP/CEP effects
name: "Space ASAT Escalation"
date: "2024-06-15"
duration_hours: 12.0
latitude: 33.0
longitude: 35.0

terrain:
  width_m: 10000.0
  height_m: 10000.0
  cell_size_m: 100.0
  base_elevation_m: 200.0
  terrain_type: flat_desert

weather_conditions:
  initial_state: CLEAR
  temperature: 28.0
  humidity: 0.3

sides:
  - side: blue
    units:
      - unit_type: f16c
        count: 4
      - unit_type: m1a2
        count: 4
    experience_level: 0.7
    commander_profile: balanced_default
    doctrine_template: us_combined_arms
  - side: red
    units:
      - unit_type: t72m
        count: 8
    experience_level: 0.6
    commander_profile: aggressive_armor
    doctrine_template: russian_deep_ops

objectives:
  - objective_id: air_base
    position: [5000.0, 5000.0]
    radius_m: 500.0
    type: infrastructure

victory_conditions:
  - type: time_expired
    side: ""
    params:
      max_time_s: 43200

calibration_overrides:
  blue_start_x: 2000.0
  blue_start_y: 5000.0
  red_start_x: 8000.0
  red_start_y: 5000.0
