name: "CBRN Chemical Defense Validation"
description: >
  Chemical strike on defended position. Validates Pasquill-Gifford dispersal,
  MOPP protection effectiveness, and probit casualty rates. Red force fires
  sarin artillery shells at blue defensive positions. Blue platoon 1 at MOPP-0,
  platoon 2 at MOPP-4.
start_date: "1991-01-17"
duration_s: 3600
seed: 42

terrain:
  type: procedural
  width_m: 2000
  height_m: 2000
  cell_size_m: 50
  base_elevation_m: 100

sides:
  blue:
    units:
      - unit_type: us_rifle_squad
        count: 2
        position: [1000.0, 1000.0]
        overrides:
          entity_id: blue_plt1
          personnel_count: 30
      - unit_type: us_rifle_squad
        count: 2
        position: [1000.0, 1050.0]
        overrides:
          entity_id: blue_plt2
          personnel_count: 30
  red:
    units:
      - unit_type: m109a6
        count: 1
        position: [100.0, 100.0]
        overrides:
          entity_id: red_arty

cbrn:
  enable_cbrn: true
  agent_releases:
    - agent_id: sarin
      position: [1000.0, 1000.0]
      quantity_kg: 10.0
      delivery_method: artillery
      time_s: 0

calibration_overrides:
  cbrn_update_interval_s: 5.0

documented_outcomes:
  description: >
    MOPP-0 units suffer significantly higher casualties than MOPP-4 units.
    Sarin disperses within minutes, creating a hazard area of ~500m radius.
  expected_mopp0_casualty_rate_min: 0.3
  expected_mopp4_casualty_rate_max: 0.1
  expected_hazard_radius_m: 500
