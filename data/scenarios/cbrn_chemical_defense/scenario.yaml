name: "CBRN Chemical Defense Validation"
date: "2024-06-15T06:00:00Z"
duration_hours: 1.0
era: modern

tick_resolution:
  strategic_s: 300
  operational_s: 60
  tactical_s: 5

terrain:
  width_m: 10000
  height_m: 10000
  cell_size_m: 100.0
  base_elevation_m: 100.0
  terrain_type: flat_desert

sides:
  - side: blue
    units:
      - unit_type: us_rifle_squad
        count: 4
    experience_level: 0.5
    morale_initial: STEADY

  - side: red
    units:
      - unit_type: m109a6
        count: 2
    experience_level: 0.5
    morale_initial: STEADY

objectives:
  - objective_id: chemical_defense_zone
    position: [5000, 5000]
    radius_m: 500
    type: territory

victory_conditions:
  - type: time_expired
    side: blue
    params:
      max_duration_s: 3600
  - type: force_destroyed
    side: ""
    params:
      threshold: 0.8

cbrn:
  enable_cbrn: true
  agent_releases:
    - agent_id: sarin
      position: [5000.0, 5000.0]
      quantity_kg: 10.0
      delivery_method: artillery
      time_s: 0

calibration_overrides:
  # Blue starts in the contaminated zone (objective area)
  blue_start_x: 5000.0
  blue_start_y: 5000.0
  # Red artillery positioned 8km away (well within 30km howitzer range,
  # well beyond 3km minimum range)
  red_start_x: 5000.0
  red_start_y: 1000.0
  defensive_sides: [red]
  weapon_assignments:
    "M284 155mm Howitzer": m284_155mm
    "M4A1 Carbine": m4_556mm
    "M249 SAW": m240_762mm
    "M240B GPMG": m240_762mm

documented_outcomes:
  - name: chemical_exposure
    value: 0.5
    tolerance_factor: 3.0
    unit: ratio
    source: "FM 3-11 tables"
    source_quality: 2
    notes: "MOPP-0 units suffer higher casualties than MOPP-4"

sources:
  - "FM 3-11 Chemical, Biological, Radiological, Nuclear, and Explosives"
