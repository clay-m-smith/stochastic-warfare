name: "Falklands San Carlos Campaign (May 21-25, 1982)"
date: "1982-05-21T08:00:00Z"
duration_hours: 120.0
latitude: -51.8
longitude: -59.0

tick_resolution:
  strategic_s: 3600
  operational_s: 300
  tactical_s: 5

weather_conditions:
  visibility_m: 15000
  wind_speed_mps: 10.0
  wind_direction_deg: 240
  temperature_c: 5.0
  precipitation: none
  cloud_cover: 0.6
  humidity: 0.70
  sea_state: 4

terrain:
  width_m: 200000
  height_m: 200000
  cell_size_m: 1000.0
  base_elevation_m: 0.0
  terrain_type: open_ocean

sides:
  - side: blue
    units:
      - unit_type: type42_destroyer
        count: 4
      - unit_type: type22_frigate
        count: 4
      - unit_type: sea_harrier
        count: 8
    experience_level: 0.7
    morale_initial: STEADY
    commander_profile: naval_surface
    doctrine_template: nato_standard
    depots:
      - depot_id: blue_supply_ship
        position: [50000, 100000]
        capacity_tons: 5000
        throughput_tons_per_hour: 50.0

  - side: red
    units:
      - unit_type: super_etendard
        count: 8
    experience_level: 0.6
    morale_initial: STEADY
    commander_profile: aggressive_armor
    doctrine_template: generic_offense

objectives:
  - objective_id: san_carlos_anchorage
    position: [80000, 100000]
    radius_m: 5000
    type: territory
  - objective_id: approach_zone
    position: [140000, 100000]
    radius_m: 10000
    type: key_terrain

victory_conditions:
  - type: force_destroyed
    side: red
    params:
      threshold: 0.5
  - type: time_expired
    side: blue
    params:
      max_duration_s: 432000

reinforcements:
  - side: red
    arrival_time_s: 86400  # 24 hours
    units:
      - unit_type: super_etendard
        count: 2
    position: [199000, 100000]
  - side: red
    arrival_time_s: 172800  # 48 hours
    units:
      - unit_type: super_etendard
        count: 2
    position: [199000, 100000]
  - side: red
    arrival_time_s: 259200  # 72 hours
    units:
      - unit_type: super_etendard
        count: 2
    position: [199000, 100000]
  - side: red
    arrival_time_s: 345600  # 96 hours
    units:
      - unit_type: super_etendard
        count: 2
    position: [199000, 100000]

calibration_overrides:
  hit_probability_modifier: 1.0
  target_size_modifier: 1.0
  morale_degrade_rate_modifier: 0.1
  morale_force_ratio_weight: 0.0
  morale_base_degrade_rate: 0.005
  morale_casualty_weight: 0.3
  morale_check_interval: 50
  blue_force_ratio_modifier: 1.0
  red_force_ratio_modifier: 4.0
  blue_cohesion: 0.9
  red_cohesion: 0.9
  blue_start_x: 80000.0
  blue_start_y: 100000.0
  red_start_x: 190000.0
  red_start_y: 100000.0
  weapon_assignments:
    "AM.39 Exocet": am39_exocet
    "Sea Dart SAM": sea_dart
    "Sea Wolf SAM": sea_dart
    "4.5 inch Mk 8 Naval Gun": mk45_5inch
    "30mm ADEN": m61a1_vulcan
    "DEFA 553 30mm Cannon": m61a1_vulcan
    "AIM-9L Sidewinder": aim9x_sidewinder

documented_outcomes:
  - name: blue_ships_sunk
    value: 2.0
    tolerance_factor: 3.0
    unit: ships
    source: "Freedman, *The Official History of the Falklands Campaign*"
    source_quality: 0
    notes: "HMS Ardent and HMS Antelope sunk during San Carlos landings"
  - name: red_units_destroyed
    value: 10.0
    tolerance_factor: 3.0
    unit: aircraft
    source: "Falklands Campaign records"
    source_quality: 1
    notes: "Argentine aircraft losses from all causes over 5 days"
  - name: campaign_duration_s
    value: 432000.0
    tolerance_factor: 1.5
    unit: seconds
    source: "Official campaign timeline"
    source_quality: 1
    notes: "5 days of operations"

ai_expectations:
  - side: red
    time_range_s: [0, 432000]
    expected_posture: attack
    description: "Argentine aircraft make strike runs throughout campaign"
    tolerance: moderate
  - side: blue
    time_range_s: [0, 432000]
    expected_posture: defend
    description: "British maintain air defense posture throughout"
    tolerance: moderate

sources:
  - "Freedman, Lawrence. *The Official History of the Falklands Campaign*"
  - "Woodward, Sandy. *One Hundred Days*"
  - "Clapp, Michael and Southby-Tailyour, Ewen. *Amphibious Assault Falklands*"
  - "Ethell, Jeffrey and Price, Alfred. *Air War South Atlantic*"
  - "Brown, David. *The Royal Navy and the Falklands War*"
