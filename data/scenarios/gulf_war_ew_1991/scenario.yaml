latitude: 33.3
longitude: 44.4

weather_conditions:
  visibility_m: 3000
  wind_speed_mps: 10.0
  wind_direction_deg: 315
  temperature_c: 8.0
  precipitation: none
  cloud_cover: 0.6
  humidity: 0.45

sides:
  - side: blue
    units:
      - unit_type: f16c
        count: 60
      - unit_type: mq9
        count: 12
      - unit_type: ah64d
        count: 8
    experience_level: 0.8
    morale_initial: STEADY
  - side: red
    units:
      - unit_type: sa6_gainful
        count: 24
    experience_level: 0.35
    morale_initial: STEADY

blue_forces:
  side: blue
  units:
    - unit_type: f16c
      count: 60
    - unit_type: mq9
      count: 12
    - unit_type: ah64d
      count: 8
  personnel_total: 96
  experience_level: 0.8
  morale_initial: STEADY

red_forces:
  side: red
  units:
    - unit_type: sa6_gainful
      count: 24
  personnel_total: 480
  experience_level: 0.35
  morale_initial: STEADY

terrain:
  width_m: 100000
  height_m: 80000
  cell_size_m: 500.0
  base_elevation_m: 50.0
  terrain_type: flat_desert

ew_config:
  enable_ew: true
  blue_jammers:
    - jammer_id: ef111_jammer_1
      platform_type: airborne
      frequency_min_ghz: 0.064
      frequency_max_ghz: 18.0
      power_dbm: 73.0
      antenna_gain_dbi: 15.0
      bandwidth_ghz: 0.5
      techniques: [1, 2, 4]  # BARRAGE, SPOT, DECEPTIVE
    - jammer_id: ea6b_jammer_1
      platform_type: airborne
      frequency_min_ghz: 0.064
      frequency_max_ghz: 18.0
      power_dbm: 73.0
      antenna_gain_dbi: 15.0
      bandwidth_ghz: 0.1
      techniques: [2, 4]  # SPOT, DECEPTIVE
  blue_sigint_collectors:
    - collector_id: f4g_wild_weasel
      receiver_sensitivity_dbm: -105.0
      frequency_range_ghz: [2.0, 18.0]
      bandwidth_ghz: 1.5
      df_accuracy_deg: 1.0
      has_tdoa: false
      aperture_m: 3.0
  red_eccm_suites:
    - suite_id: iraqi_sam_eccm
      techniques: [0]  # FREQUENCY_HOP
      hop_bandwidth_ghz: 0.3
      hop_rate_hz: 50.0
      sidelobe_ratio_db: 15.0

documented_outcomes:
  - name: iads_suppression_rate
    value: 0.75
    tolerance_factor: 2.0
    unit: "fraction"
    source: "Keaney & Cohen, *Gulf War Air Power Survey*"
    source_quality: 1
    notes: "Estimated 75% IADS suppression in first 6 hours"
  - name: coalition_air_losses
    value: 1
    tolerance_factor: 5.0
    unit: "aircraft"
    source: "DoD, *Conduct of the Persian Gulf War*"
    source_quality: 1
    notes: "1 F/A-18 lost in first night (non-EW engagement)"
  - name: harm_effectiveness
    value: 0.6
    tolerance_factor: 2.0
    unit: "fraction"
    source: "Werrell, *Archie to SAM*"
    source_quality: 2
    notes: "Estimated HARM effectiveness against radiating targets"

victory_conditions:
  - type: force_destroyed
    side: ""
    params:
      threshold: 0.3
  - type: morale_collapsed
    side: ""
  - type: time_expired
    side: blue
    params:
      max_duration_s: 21600

