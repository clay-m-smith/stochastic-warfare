  - type: force_destroyed
    side: ""
    params:
      threshold: 0.6
  - type: time_expired
    side: blue
    params:
      max_duration_s: 345600
  - type: morale_collapsed
    side: ""

reinforcements:
  - side: blue
    arrival_time_s: 172800
    units:
      - unit_type: m1a2
        count: 2
      - unit_type: m3a2_bradley
        count: 4
