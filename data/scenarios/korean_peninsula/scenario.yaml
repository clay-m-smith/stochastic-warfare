  - side: red
    arrival_time_s: 86400
    units:
      - unit_type: t72m
        count: 4
      - unit_type: bmp1
        count: 6
    position: [19500, 7500]

calibration_overrides:
  hit_probability_modifier: 1.0
  target_size_modifier: 0.6
  morale_degrade_rate_modifier: 0.25
  morale_base_degrade_rate: 0.008
  morale_casualty_weight: 0.4
  morale_check_interval: 25
  blue_force_ratio_modifier: 2.0
  red_force_ratio_modifier: 1.0
  blue_cohesion: 0.85
  red_cohesion: 0.55
  destruction_threshold: 0.5
  blue_start_x: 3000.0
  blue_start_y: 7500.0
  red_start_x: 18000.0
  red_start_y: 7500.0

cbrn_config:
  enable_cbrn: true
  threat_level: chemical
  agent_types: [nerve_persistent]
  detection_threshold: 0.1
  mopp_level_default: 0

documented_outcomes:
  - name: red_armor_destroyed
    value: 12.0
    tolerance_factor: 3.0
    unit: tanks
    source: "Cordesman, *The Korean Military Balance*"
    source_quality: 2
    notes: "Estimated armor losses in prepared defense scenario"
  - name: blue_units_destroyed
    value: 3.0
    tolerance_factor: 3.0
    unit: vehicles
    source: "IISS, *The Military Balance*"
    source_quality: 2
    notes: "Estimated defender losses with prepared positions"
  - name: territorial_penetration_m
    value: 5000.0
    tolerance_factor: 3.0
    unit: meters
    source: "Analytical estimate"
    source_quality: 2
    notes: "Expected penetration depth against prepared defense"

ai_expectations:
  - side: red
    time_range_s: [0, 172800]
    expected_posture: attack
    description: "DPRK forces attack with massed armor in first 48h"
    tolerance: moderate
  - side: blue
    time_range_s: [0, 345600]
    expected_posture: defend
    description: "ROK/US forces defend prepared positions throughout"
    tolerance: moderate

sources:
  - "Cordesman, Anthony H. *The Korean Military Balance*. CSIS, 2011"
  - "IISS. *The Military Balance 2024*. Routledge, 2024"
  - "Bennett, Bruce W. *Preparing for the Possibility of a North Korean Collapse*. RAND, 2013"
