  - objective_id: western_approaches
    position: [15000, 30000]
    radius_m: 5000
    type: key_terrain
  - objective_id: eastern_approaches
    position: [45000, 30000]
    radius_m: 5000
    type: key_terrain

victory_conditions:
  - type: force_destroyed
    side: ""
    params:
      threshold: 0.3
  - type: time_expired
    side: blue
    params:
      max_duration_s: 259200
  - type: morale_collapsed
    side: ""

reinforcements:
  - side: blue
    arrival_time_s: 86400
    units:
      - unit_type: ddg51
        count: 2
      - unit_type: f16c
        count: 4
    position: [5000, 30000]

calibration_overrides:
  roe_level: WEAPONS_TIGHT
  hit_probability_modifier: 3.0
  target_size_modifier: 2.0
  morale_degrade_rate_modifier: 5.0
  morale_base_degrade_rate: 0.01
  morale_casualty_weight: 0.5
  morale_check_interval: 5
  blue_cohesion: 0.85
  red_cohesion: 0.65
  blue_force_ratio_modifier: 1.8
  target_size_modifier_blue: 0.3
  target_size_modifier_red: 2.0
  destruction_threshold: 0.15
  blue_start_x: 15000.0
  blue_start_y: 30000.0
  red_start_x: 45000.0
  red_start_y: 30000.0
  defensive_sides: [blue]
  max_engagers_per_side: 5
  observation_decay_rate: 0.02

ew_config:
  enable_ew: true
  blue_jammers:
    - jammer_id: blue_standoff_jammer
      platform_type: airborne
      frequency_min_ghz: 2.0
      frequency_max_ghz: 18.0
      power_dbm: 70.0
      antenna_gain_dbi: 14.0
      bandwidth_ghz: 0.1
      techniques: [1, 2, 4]
  red_eccm_suites:
    - suite_id: red_naval_eccm
      techniques: [0]
      hop_bandwidth_ghz: 0.3
      hop_rate_hz: 200.0
      sidelobe_ratio_db: 22.0

dew_config:
  enable_dew: true

escalation_config:
  entry_thresholds: [0.0, 0.20, 0.35, 0.45, 0.60, 0.75, 0.85, 0.92, 0.95, 0.97, 0.99]
  hysteresis_factor: 0.65
  cooldown_s: 14400

# Phase 54e: space domain — GPS, ISR, SATCOM, ASAT
space_config:
  enable_space: true
  gps_sigma_range_m: 5.0
  ins_drift_rate_m_per_s: 0.6

documented_outcomes:
  - name: blue_ships_sunk
    value: 1.0
    tolerance_factor: 3.0
    unit: ships
    source: "Heginbotham, *The U.S.-China Military Scorecard*"
    source_quality: 2
    notes: "Estimated carrier group losses in peer confrontation"
  - name: red_ships_sunk
    value: 2.0
    tolerance_factor: 3.0
    unit: ships
    source: "Biddle & Oelrich, *Future Warfare in the Western Pacific*"
    source_quality: 2
    notes: "Estimated PLAN surface combatant losses"
  - name: red_units_destroyed
    value: 6.0
    tolerance_factor: 3.0
    unit: aircraft
    source: "RAND Corporation analysis"
    source_quality: 2
    notes: "Estimated aircraft attrition in contested environment"

ai_expectations:
  - side: red
    time_range_s: [0, 86400]
    expected_posture: attack
    description: "PLAN attempts to establish sea control in first 24h"
    tolerance: moderate
  - side: blue
    time_range_s: [0, 259200]
    expected_posture: defend
    description: "US/Taiwan maintain defensive posture and sea denial"
    tolerance: moderate

sources:
  - "Heginbotham, Eric et al. *The U.S.-China Military Scorecard*. RAND, 2015"
  - "Biddle, Stephen & Oelrich, Ivan. *Future Warfare in the Western Pacific*. International Security, 2016"
  - "Cliff, Roger. *China's Military Power*. Cambridge University Press, 2015"
