[build-system]
requires = ["setuptools>=68.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[project]
name = "stochastic-warfare"
version = "0.1.0"
description = "High-fidelity stochastic wargame simulator"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.26",
    "scipy>=1.11",
    "pydantic>=2.0",
    "pyproj>=3.6",
    "pyyaml>=6.0",
    "shapely>=2.0",
    "networkx>=3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4",
    "pytest-cov>=4.1",
    "matplotlib>=3.8",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
strict_markers = true
addopts = "-m 'not slow'"
markers = [
    "slow: marks tests as slow (1000-run Monte Carlo, run explicitly with '-m slow')",
]

[tool.setuptools.packages.find]
include = ["stochastic_warfare*"]
